version: 2
updates:
  - package-ecosystem: "nuget"
    assignees: ["frasermolyneux"]
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:15"
      timezone: "Etc/UTC"
    groups:
      nuget:
        patterns:
          - "*"
    ignore:
      - dependency-name: "Microsoft.ApplicationInsights*"
        versions: [">=3.0.0"]
      - dependency-name: "Nerdbank.GitVersioning"
        versions: [">=3.10.0"]

  - package-ecosystem: "terraform"
    assignees: ["frasermolyneux"]
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:15"
      timezone: "Etc/UTC"
    groups:
      terraform:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    assignees: ["frasermolyneux"]
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:15"
      timezone: "Etc/UTC"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    assignees: ["frasermolyneux"]
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:15"
      timezone: "Etc/UTC"
    groups:
      devcontainers:
        patterns:
          - "*"